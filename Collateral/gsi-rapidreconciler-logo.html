<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GSI RapidReconciler — Logo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f0f5ff; font-family: Arial, sans-serif; padding: 60px 40px; }
  h2 { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: #5a7a9a; margin-bottom: 24px; }
  .swatch { padding: 60px 80px; border-radius: 8px; margin-bottom: 40px; display: flex; align-items: center; justify-content: flex-start; }
  .swatch.light { background: #ffffff; border: 1px solid #d0e4f7; }
  .swatch.dark  { background: #1e3a5f; }
  .swatch.navy  { background: #0f1f35; }
  .note { font-size: 11px; color: #5a7a9a; margin-top: 10px; letter-spacing: 0.5px; }
</style>
</head>
<body>

<h2>GSI RapidReconciler — Logo Variations</h2>

<!-- LIGHT BACKGROUND VERSION -->
<div class="swatch light">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
    <defs>
      <linearGradient id="cB" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#1e3a5f"/>
        <stop offset="100%" stop-color="#163050"/>
      </linearGradient>
      <linearGradient id="cO" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#4a90d9"/>
        <stop offset="100%" stop-color="#2e6db5"/>
      </linearGradient>
      <linearGradient id="dG" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#f07820" stop-opacity="0"/>
        <stop offset="25%" stop-color="#f07820"/>
        <stop offset="75%" stop-color="#f07820"/>
        <stop offset="100%" stop-color="#f07820" stop-opacity="0"/>
      </linearGradient>
      <filter id="sh">
        <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#1e3a5f" flood-opacity="0.2"/>
      </filter>
    </defs>

    <!-- Back cloud - dark navy -->
    <g filter="url(#sh)">
      <path d="M145,152 H58 a36,36 0 0,1 -6,-71 a2,2 0 0,1 1,-1 a48,48 0 0,1 93,-9 a2,2 0 0,1 1,0 a28,28 0 0,1 -2,57 Z"
            fill="url(#cB)"/>
    </g>

    <!-- Front cloud overlay - lighter blue -->
    <path d="M155,132 H84 a28,28 0 0,1 -5,-55 a1.5,1.5 0 0,1 1,-1 a38,38 0 0,1 74,-7 a1.5,1.5 0 0,1 1,0 a22,22 0 0,1 -2,45 Z"
          fill="url(#cO)" opacity="0.88"/>

    <!-- Network icon: central hub -->
    <circle cx="103" cy="114" r="9"   fill="white" opacity="0.95"/>
    <circle cx="103" cy="114" r="5"   fill="#1e3a5f"/>
    <!-- Left node -->
    <circle cx="70"  cy="136" r="6.5" fill="white" opacity="0.9"/>
    <circle cx="70"  cy="136" r="3.5" fill="#4a90d9"/>
    <!-- Right node -->
    <circle cx="138" cy="136" r="6.5" fill="white" opacity="0.9"/>
    <circle cx="138" cy="136" r="3.5" fill="#4a90d9"/>
    <!-- Top node -->
    <circle cx="103" cy="86"  r="5"   fill="white" opacity="0.85"/>
    <circle cx="103" cy="86"  r="3"   fill="#3a7bc8"/>
    <!-- Connectors -->
    <line x1="103" y1="114" x2="70"  y2="136" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
    <line x1="103" y1="114" x2="138" y2="136" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
    <line x1="103" y1="114" x2="103" y2="86"  stroke="white" stroke-width="2"   stroke-linecap="round" opacity="0.8"/>
    <line x1="70"  y1="136" x2="138" y2="136" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>

    <!-- GSI wordmark -->
    <text x="175" y="150"
          font-family="'Arial Black', Arial, sans-serif"
          font-weight="900" font-size="84" letter-spacing="-2"
          fill="#1e3a5f">GSI</text>

    <!-- Orange vertical divider -->
    <rect x="368" y="24" width="3.5" height="152" rx="2" fill="url(#dG)"/>

    <!-- RapidReconciler main text -->
    <text x="392" y="106"
          font-family="Arial, Helvetica, sans-serif"
          font-weight="800" font-size="52" letter-spacing="-0.5"
          fill="#1e3a5f">RapidReconciler</text>

    <!-- Tagline -->
    <text x="394" y="138"
          font-family="Arial, Helvetica, sans-serif"
          font-weight="400" font-size="18" letter-spacing="4"
          fill="#1a56a0">INVENTORY INTELLIGENCE</text>

    <!-- Orange accent underline -->
    <rect x="394" y="150" width="326" height="3" rx="1.5" fill="#f07820"/>

    <!-- Powered by line -->
    <text x="394" y="176"
          font-family="Arial, Helvetica, sans-serif"
          font-weight="400" font-size="13" letter-spacing="1.2"
          fill="#5a7a9a">AI-Enhanced JD Edwards Reconciliation · Powered by GSI</text>
  </svg>
</div>
<p class="note">↑ Light background version — for use on white / cream dashboards</p>

<!-- DARK BACKGROUND VERSION -->
<div style="margin-top:40px;">
  <h2>Dark Background Version</h2>
  <div class="swatch dark" style="margin-top:24px;">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
      <defs>
        <linearGradient id="cB2" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#4a90d9"/>
          <stop offset="100%" stop-color="#2e6db5"/>
        </linearGradient>
        <linearGradient id="cO2" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#7ab8f0"/>
          <stop offset="100%" stop-color="#4a90d9"/>
        </linearGradient>
        <linearGradient id="dG2" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#f07820" stop-opacity="0"/>
          <stop offset="25%" stop-color="#f07820"/>
          <stop offset="75%" stop-color="#f07820"/>
          <stop offset="100%" stop-color="#f07820" stop-opacity="0"/>
        </linearGradient>
        <filter id="sh2">
          <feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
        </filter>
      </defs>

      <!-- Back cloud -->
      <g filter="url(#sh2)">
        <path d="M145,152 H58 a36,36 0 0,1 -6,-71 a2,2 0 0,1 1,-1 a48,48 0 0,1 93,-9 a2,2 0 0,1 1,0 a28,28 0 0,1 -2,57 Z"
              fill="url(#cB2)"/>
      </g>
      <!-- Front cloud -->
      <path d="M155,132 H84 a28,28 0 0,1 -5,-55 a1.5,1.5 0 0,1 1,-1 a38,38 0 0,1 74,-7 a1.5,1.5 0 0,1 1,0 a22,22 0 0,1 -2,45 Z"
            fill="url(#cO2)" opacity="0.8"/>

      <!-- Network icon -->
      <circle cx="103" cy="114" r="9"   fill="white" opacity="0.95"/>
      <circle cx="103" cy="114" r="5"   fill="#1e3a5f"/>
      <circle cx="70"  cy="136" r="6.5" fill="white" opacity="0.9"/>
      <circle cx="70"  cy="136" r="3.5" fill="#4a90d9"/>
      <circle cx="138" cy="136" r="6.5" fill="white" opacity="0.9"/>
      <circle cx="138" cy="136" r="3.5" fill="#4a90d9"/>
      <circle cx="103" cy="86"  r="5"   fill="white" opacity="0.85"/>
      <circle cx="103" cy="86"  r="3"   fill="#7ab8f0"/>
      <line x1="103" y1="114" x2="70"  y2="136" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
      <line x1="103" y1="114" x2="138" y2="136" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
      <line x1="103" y1="114" x2="103" y2="86"  stroke="white" stroke-width="2"   stroke-linecap="round" opacity="0.8"/>
      <line x1="70"  y1="136" x2="138" y2="136" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>

      <!-- GSI wordmark - white -->
      <text x="175" y="150"
            font-family="'Arial Black', Arial, sans-serif"
            font-weight="900" font-size="84" letter-spacing="-2"
            fill="white">GSI</text>

      <!-- Orange divider -->
      <rect x="368" y="24" width="3.5" height="152" rx="2" fill="url(#dG2)"/>

      <!-- RapidReconciler - white -->
      <text x="392" y="106"
            font-family="Arial, Helvetica, sans-serif"
            font-weight="800" font-size="52" letter-spacing="-0.5"
            fill="white">RapidReconciler</text>

      <!-- Tagline - light blue -->
      <text x="394" y="138"
            font-family="Arial, Helvetica, sans-serif"
            font-weight="400" font-size="18" letter-spacing="4"
            fill="#7ab8f0">INVENTORY INTELLIGENCE</text>

      <!-- Orange underline -->
      <rect x="394" y="150" width="326" height="3" rx="1.5" fill="#f07820"/>

      <!-- Powered by - muted white -->
      <text x="394" y="176"
            font-family="Arial, Helvetica, sans-serif"
            font-weight="400" font-size="13" letter-spacing="1.2"
            fill="rgba(255,255,255,0.45)">AI-Enhanced JD Edwards Reconciliation · Powered by GSI</text>
    </svg>
  </div>
  <p class="note" style="color:#888;">↑ Dark background version — for use on navy dashboard headers</p>
</div>

<!-- ICON-ONLY COMPACT VERSION -->
<div style="margin-top:40px;">
  <h2>Compact Version — No Tagline</h2>
  <div class="swatch light" style="padding:40px 80px;margin-top:24px;">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 140" width="640" height="140">
      <defs>
        <linearGradient id="cB3" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#1e3a5f"/>
          <stop offset="100%" stop-color="#163050"/>
        </linearGradient>
        <linearGradient id="cO3" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#4a90d9"/>
          <stop offset="100%" stop-color="#2e6db5"/>
        </linearGradient>
        <linearGradient id="dG3" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#f07820" stop-opacity="0"/>
          <stop offset="25%" stop-color="#f07820"/>
          <stop offset="75%" stop-color="#f07820"/>
          <stop offset="100%" stop-color="#f07820" stop-opacity="0"/>
        </linearGradient>
        <filter id="sh3">
          <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1e3a5f" flood-opacity="0.2"/>
        </filter>
      </defs>

      <!-- Back cloud -->
      <g filter="url(#sh3)">
        <path d="M102,108 H40 a26,26 0 0,1 -4,-51 a1.5,1.5 0 0,1 1,-1 a34,34 0 0,1 66,-7 a1.5,1.5 0 0,1 1,0 a20,20 0 0,1 -2,41 Z"
              fill="url(#cB3)"/>
      </g>
      <!-- Front cloud -->
      <path d="M110,94 H60 a20,20 0 0,1 -4,-39 a1,1 0 0,1 1,-1 a27,27 0 0,1 53,-5 a1,1 0 0,1 0,0 a16,16 0 0,1 -1,32 Z"
            fill="url(#cO3)" opacity="0.85"/>

      <!-- Network icon: scaled down -->
      <circle cx="73"  cy="82"  r="6.5" fill="white" opacity="0.95"/>
      <circle cx="73"  cy="82"  r="3.8" fill="#1e3a5f"/>
      <circle cx="50"  cy="98"  r="4.5" fill="white" opacity="0.9"/>
      <circle cx="50"  cy="98"  r="2.5" fill="#4a90d9"/>
      <circle cx="98"  cy="98"  r="4.5" fill="white" opacity="0.9"/>
      <circle cx="98"  cy="98"  r="2.5" fill="#4a90d9"/>
      <circle cx="73"  cy="62"  r="3.5" fill="white" opacity="0.85"/>
      <circle cx="73"  cy="62"  r="2"   fill="#3a7bc8"/>
      <line x1="73" y1="82" x2="50" y2="98" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.9"/>
      <line x1="73" y1="82" x2="98" y2="98" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.9"/>
      <line x1="73" y1="82" x2="73" y2="62" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
      <line x1="50" y1="98" x2="98" y2="98" stroke="white" stroke-width="1"   stroke-linecap="round" opacity="0.4"/>

      <!-- GSI text -->
      <text x="122" y="106"
            font-family="'Arial Black', Arial, sans-serif"
            font-weight="900" font-size="60" letter-spacing="-1"
            fill="#1e3a5f">GSI</text>

      <!-- Orange divider -->
      <rect x="258" y="16" width="3" height="108" rx="1.5" fill="url(#dG3)"/>

      <!-- RapidReconciler -->
      <text x="278" y="86"
            font-family="Arial, Helvetica, sans-serif"
            font-weight="800" font-size="44" letter-spacing="-0.5"
            fill="#1e3a5f">RapidReconciler</text>

      <!-- Subtitle -->
      <text x="280" y="112"
            font-family="Arial, Helvetica, sans-serif"
            font-weight="400" font-size="14" letter-spacing="3.5"
            fill="#1a56a0">INVENTORY INTELLIGENCE · GSI</text>

      <!-- Orange underline -->
      <rect x="280" y="122" width="232" height="2.5" rx="1.25" fill="#f07820"/>
    </svg>
  </div>
  <p class="note">↑ Compact version — for dashboard headers and smaller display areas</p>
</div>

</body>
</html>
