<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 220" width="920" height="220">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@700;800&amp;display=swap');
    </style>

    <!-- Cloud gradient: dark navy base -->
    <linearGradient id="cloudBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#163050"/>
    </linearGradient>

    <!-- Cloud overlay: lighter blue -->
    <linearGradient id="cloudOver" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a90d9"/>
      <stop offset="100%" stop-color="#2e6db5"/>
    </linearGradient>

    <!-- Divider gradient -->
    <linearGradient id="divGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f07820" stop-opacity="0"/>
      <stop offset="30%" stop-color="#f07820"/>
      <stop offset="70%" stop-color="#f07820"/>
      <stop offset="100%" stop-color="#f07820" stop-opacity="0"/>
    </linearGradient>

    <!-- Subtle drop shadow for cloud -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#1e3a5f" flood-opacity="0.25"/>
    </filter>

    <!-- Glow for icon lines -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ══ CLOUD ICON ══ -->
  <!-- Back cloud (dark navy) -->
  <g filter="url(#shadow)">
    <!-- Main cloud body - dark navy -->
    <path d="
      M 148 158
      H 60
      a 38 38 0 0 1 -7 -75
      a 2 2 0 0 1 1 -1
      a 50 50 0 0 1 97 -10
      a 2 2 0 0 1 1 0
      a 30 30 0 0 1 -2 60
      Z
    " fill="url(#cloudBase)"/>
  </g>

  <!-- Front cloud overlay (lighter blue, offset up-right) -->
  <path d="
    M 158 138
    H 85
    a 30 30 0 0 1 -5 -59
    a 1.5 1.5 0 0 1 1 -1
    a 40 40 0 0 1 77 -8
    a 1.5 1.5 0 0 1 1 0
    a 24 24 0 0 1 -2 48
    Z
  " fill="url(#cloudOver)" opacity="0.85"/>

  <!-- ══ WHITE RECONCILER CROSSHAIR / PIN ICON ══ -->
  <!-- Central hub circle -->
  <circle cx="105" cy="122" r="9" fill="white" opacity="0.95"/>
  <circle cx="105" cy="122" r="5.5" fill="#1e3a5f"/>

  <!-- Left satellite node -->
  <circle cx="72" cy="145" r="6" fill="white" opacity="0.9"/>
  <circle cx="72" cy="145" r="3.5" fill="#4a90d9"/>

  <!-- Right satellite node -->
  <circle cx="140" cy="145" r="6" fill="white" opacity="0.9"/>
  <circle cx="140" cy="145" r="3.5" fill="#4a90d9"/>

  <!-- Top node -->
  <circle cx="105" cy="92" r="5" fill="white" opacity="0.85"/>
  <circle cx="105" cy="92" r="3" fill="#2e6db5"/>

  <!-- Connector lines -->
  <line x1="105" y1="122" x2="72" y2="145" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9" filter="url(#glow)"/>
  <line x1="105" y1="122" x2="140" y2="145" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9" filter="url(#glow)"/>
  <line x1="105" y1="122" x2="105" y2="92" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.8" filter="url(#glow)"/>
  <!-- Cross line through center -->
  <line x1="72" y1="145" x2="140" y2="145" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

  <!-- ══ GSI TEXT ══ -->
  <!-- Bold GSI wordmark -->
  <text
    x="178" y="158"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="88"
    letter-spacing="-2"
    fill="#1e3a5f"
  >GSI</text>

  <!-- ══ VERTICAL DIVIDER ══ -->
  <rect x="372" y="30" width="3" height="160" fill="url(#divGrad)" rx="1.5"/>

  <!-- ══ RAPIDRECONCILER TEXT BLOCK ══ -->
  <!-- "RapidReconciler" main text -->
  <text
    x="396" y="115"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="800"
    font-size="56"
    letter-spacing="-1"
    fill="#1e3a5f"
  >RapidReconciler</text>

  <!-- Tagline beneath -->
  <text
    x="398" y="150"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="400"
    font-size="20"
    letter-spacing="3"
    fill="#1a56a0"
  >INVENTORY INTELLIGENCE</text>

  <!-- Orange accent line under tagline -->
  <rect x="398" y="162" width="340" height="3" fill="#f07820" rx="1.5"/>

  <!-- "by GSI" subtle sub-label -->
  <text
    x="398" y="190"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="400"
    font-size="15"
    letter-spacing="1.5"
    fill="#5a7a9a"
  >Powered by GSI — AI-Enhanced JD Edwards Reconciliation</text>

</svg>
